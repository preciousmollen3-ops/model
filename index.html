<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maize Disease API Client</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 16px;
      color: #111;
      background: #f7f7f7;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
      color: #234;
    }
    p {
      margin-top: 0;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 14px 32px rgba(0,0,0,0.08);
      padding: 24px;
      margin-top: 20px;
    }
    label,
    button {
      display: block;
      width: 100%;
    }
    input[type="file"] {
      margin-top: 12px;
    }
    button {
      margin-top: 16px;
      padding: 12px 16px;
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f1f5f9;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Maize Disease API</h1>
    <p>Upload a leaf image or capture one with your camera, then send it to the prediction API.</p>
    <form id="uploadForm">
      <label for="photo">Choose an image file (JPG/PNG)</label>
      <input type="file" id="photo" name="photo" accept="image/jpeg,image/png" />
      <button type="button" id="startCamera">Use Camera</button>
      <div id="cameraArea" style="display:none; margin-top:16px;">
        <video id="video" width="100%" autoplay playsinline style="border-radius:12px; background:#000;"></video>
        <button type="button" id="captureButton" style="margin-top:12px;">Capture Photo</button>
      </div>
      <button type="submit">Send to API</button>
    </form>
    <div id="responseArea">
      <h2>Response</h2>
      <pre id="responseText">No response yet.</pre>
    </div>
  </div>
  <script>
    const form = document.getElementById('uploadForm');
    const responseText = document.getElementById('responseText');
    const apiUrl = 'http://localhost:8000/upload-photo/';
    const startCameraButton = document.getElementById('startCamera');
    const cameraArea = document.getElementById('cameraArea');
    const video = document.getElementById('video');
    const captureButton = document.getElementById('captureButton');
    let cameraStream = null;
    let capturedBlob = null;

    startCameraButton.addEventListener('click', async () => {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = cameraStream;
        cameraArea.style.display = 'block';
        responseText.textContent = 'Camera ready. Click Capture Photo to take a picture.';
      } catch (error) {
        responseText.textContent = 'Camera error: ' + error.message;
      }
    });

    captureButton.addEventListener('click', () => {
      if (!video.srcObject) {
        responseText.textContent = 'Camera not started yet.';
        return;
      }

      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => {
        if (!blob) {
          responseText.textContent = 'Failed to capture image.';
          return;
        }
        capturedBlob = blob;
        responseText.textContent = 'Photo captured. Submit the form to send it to the API.';
      }, 'image/jpeg');
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById('photo');
      const selectedFile = fileInput.files[0];
      const fileToSend = capturedBlob || selectedFile;

      if (!fileToSend) {
        responseText.textContent = 'Please select an image or capture one with the camera first.';
        return;
      }

      const formData = new FormData();
      formData.append('file', fileToSend, 'capture.jpg');
      responseText.textContent = 'Uploading image and waiting for response...';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || 'API request failed');
        }

        responseText.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        responseText.textContent = 'Error: ' + error.message;
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById('photo');
      const file = fileInput.files[0];
      if (!file) {
        responseText.textContent = 'Please select an image file first.';
        return;
      }

      const formData = new FormData();
      formData.append('file', file);
      responseText.textContent = 'Uploading image and waiting for response...';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || 'API request failed');
        }

        responseText.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        responseText.textContent = 'Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
